services:
  api:
    image: python:3.13-slim
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
    expose:
      - "5000"
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      alembic upgrade head &&
      python -m app.main"

  web:
    image: node:22-alpine
    working_dir: /app/web
    environment:
      VITE_API_PROXY_TARGET: http://api:5000
    volumes:
      - .:/app
      - web_node_modules:/app/web/node_modules
    expose:
      - "5173"
    depends_on:
      - api
    command: >
      sh -c "npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  web_node_modules:
